#App
spring.application.name=grievance-backend
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/grievancedb
spring.datasource.username=postgres
spring.datasource.password=avin543
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.cache.type=redis

# Redis keyspace notifications (enables SLA expiry events)
spring.data.redis.repositories.enabled=false

# JWT
jwt.secret=grievanceos-super-secret-key-change-this-in-production-min-256-bits
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# WebSocket
spring.websocket.path=/ws

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=youremail@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# S3 / Cloudinary (use one)
cloudinary.cloud-name=your-cloud-name
cloudinary.api-key=your-api-key
cloudinary.api-secret=your-api-secret

# Logging
logging.level.com.grievanceos=DEBUG
logging.level.org.springframework.security=DEBUG